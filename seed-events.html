<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Panagbenga 2026 Events Seeder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #4EA96D;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .login-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #4EA96D;
        }
        
        .btn {
            background: #4EA96D;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.2s;
        }
        
        .btn:hover {
            background: #3d8b5d;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .events-list {
            display: none;
        }
        
        .events-list.active {
            display: block;
        }
        
        .event-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #4EA96D;
        }
        
        .event-item.featured {
            border-left-color: #FFD700;
            background: linear-gradient(135deg, #fff9e6 0%, #fff 100%);
        }
        
        .event-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .event-details {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .event-details strong {
            color: #4EA96D;
        }
        
        .badge {
            background: #FFD700;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4EA96D, #667eea);
            width: 0%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Panagbenga 2026 Events Seeder</h1>
        <p class="subtitle">Add all official Panagbenga Festival events to Firebase</p>
        
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" value="reubencabrera1@gmail.com" placeholder="Enter your admin email">
            </div>
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" placeholder="Enter your admin password">
            </div>
            <button class="btn" id="loginBtn" onclick="authenticate()">
                🔐 Login & Load Events
            </button>
        </div>
        
        <!-- Events List Section -->
        <div class="events-list" id="eventsList">
            <h2 style="color: #4EA96D; margin-bottom: 20px;">📋 Events to Add (12 total)</h2>
            
            <div id="eventsContainer"></div>
            
            <div class="progress-bar hidden" id="progressBar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            
            <button class="btn" id="seedBtn" onclick="seedEvents()">
                🌸 Add All Events to Firebase
            </button>
            
            <div id="statusMessage"></div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAllxHJVBHgH3P70gfCqV4494t4ssARbig",
            authDomain: "baguioboost.firebaseapp.com",
            projectId: "baguioboost",
            storageBucket: "baguioboost.firebasestorage.app",
            messagingSenderId: "851799020380",
            appId: "1:851799020380:web:a89dc01ea4472b54a2e799",
            measurementId: "G-CBC0ZZPBDX"
        }
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig)
        const db = getFirestore(app)
        const auth = getAuth(app)
        
        // Panagbenga 2026 Events
        const panagbengaEvents = [
            {
                title: "Panagbenga Grand Opening Day Parade",
                location: "Panagbenga Park to Melvin Jones Football Grounds",
                startDate: "2026-02-01",
                endDate: "2026-02-01",
                startTime: "08:00",
                endTime: "12:00",
                status: "Upcoming",
                organizer: "BFFFI / Baguio City Government",
                description: "The official start of the 30th Panagbenga Festival featuring elementary school drum and lyre corps and festive street dancing along Session Road. Theme: 'Blooming Without End' - celebrating the Pearl Anniversary.",
                featured: true
            },
            {
                title: "Panagbenga Market Encounter & Panagbengascapes",
                location: "Juan Luna Drive and Rose Garden, Burnham Park",
                startDate: "2026-02-01",
                endDate: "2026-03-08",
                startTime: "09:00",
                endTime: "21:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "A month-long landscaping exhibition and trade fair featuring floral designs, local handicrafts, and food stalls.",
                featured: true
            },
            {
                title: "Cup of Joe: Stardust Philippine Tour 2026",
                location: "University of Baguio Gym",
                startDate: "2026-02-06",
                endDate: "2026-02-06",
                startTime: "19:00",
                endTime: "23:00",
                status: "Upcoming",
                organizer: "Ovation Productions",
                description: "A special concert by the popular Baguio-based OPM band Cup of Joe as part of the Panagbenga Festival's musical highlights.",
                featured: true
            },
            {
                title: "Floral Fiesta: Bouquet & Dish Garden Competition",
                location: "Melvin Jones Football Grounds",
                startDate: "2026-02-07",
                endDate: "2026-02-07",
                startTime: "09:00",
                endTime: "17:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "A school-based competition showcasing the floral arrangement skills of students from various schools in Baguio City.",
                featured: false
            },
            {
                title: "PMA Alumni Homecoming",
                location: "Fort Del Pilar, Baguio City",
                startDate: "2026-02-13",
                endDate: "2026-02-15",
                startTime: "08:00",
                endTime: "20:00",
                status: "Upcoming",
                organizer: "Philippine Military Academy (PMA)",
                description: "An annual tradition where thousands of PMA alumni gather for a weekend of camaraderie and celebration.",
                featured: false
            },
            {
                title: "Handog ng Panagbenga sa Pamilya Baguio",
                location: "Melvin Jones Football Grounds",
                startDate: "2026-02-14",
                endDate: "2026-02-14",
                startTime: "08:00",
                endTime: "18:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "A family-oriented Valentine's Day celebration featuring the 'Colours in Bloom' painting competition and the 11th Annual Panagbenga Kite Flying Challenge.",
                featured: false
            },
            {
                title: "Rhythm of the Highlands",
                location: "Melvin Jones Football Grounds",
                startDate: "2026-02-15",
                endDate: "2026-02-15",
                startTime: "15:00",
                endTime: "21:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "A dedicated showcase of traditional Cordilleran culture, music, and ethnic dances by indigenous cultural communities.",
                featured: false
            },
            {
                title: "Baguio Spring Festival (Chinese New Year Parade)",
                location: "Session Road to Melvin Jones",
                startDate: "2026-02-18",
                endDate: "2026-02-18",
                startTime: "10:00",
                endTime: "14:00",
                status: "Upcoming",
                organizer: "Baguio Filipino-Chinese Community",
                description: "A colorful parade celebrating the Lunar New Year, featuring dragon dances and traditional Chinese-Filipino celebrations.",
                featured: false
            },
            {
                title: "Panagbenga Grand Street Dance Parade",
                location: "Panagbenga Park → Session Road → Harrison Road → Melvin Jones",
                startDate: "2026-02-28",
                endDate: "2026-02-28",
                startTime: "08:00",
                endTime: "16:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "THE MAIN HIGHLIGHT! A massive parade of dancers in vibrant, flower-inspired costumes performing to the rhythmic Panagbenga hymn.",
                featured: true
            },
            {
                title: "Panagbenga Grand Floral Float Parade",
                location: "Panagbenga Park to Melvin Jones Football Grounds",
                startDate: "2026-03-01",
                endDate: "2026-03-01",
                startTime: "08:00",
                endTime: "17:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "The festival's MOST FAMOUS event! Giant floats made entirely of fresh flowers parade through the city streets.",
                featured: true
            },
            {
                title: "Session Road in Bloom",
                location: "Session Road (Entire length closed to traffic)",
                startDate: "2026-03-02",
                endDate: "2026-03-08",
                startTime: "09:00",
                endTime: "22:00",
                status: "Upcoming",
                organizer: "BFFFI / Baguio City Government",
                description: "Baguio's main thoroughfare transforms into a pedestrian mall with sidewalk cafés, floral installations, and local merchant stalls.",
                featured: true
            },
            {
                title: "Panagbenga Awarding and Closing Ceremonies",
                location: "Melvin Jones Football Grounds",
                startDate: "2026-03-08",
                endDate: "2026-03-08",
                startTime: "16:00",
                endTime: "22:00",
                status: "Upcoming",
                organizer: "BFFFI",
                description: "The official wrap-up featuring the PMA Silent Drill Exhibition, Little Miss Panagbenga pageant, and the 'Flowers in the Sky' Grand Fireworks Display.",
                featured: true
            }
        ]
        
        let isAuthenticated = false
        
        // Expose functions to global scope
        window.authenticate = async function() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            
            if (!email || !password) {
                alert('Please enter both email and password')
                return
            }
            
            const btn = document.getElementById('loginBtn')
            btn.disabled = true
            btn.textContent = '⏳ Authenticating...'
            
            try {
                await signInWithEmailAndPassword(auth, email, password)
                isAuthenticated = true
                
                document.getElementById('loginSection').style.display = 'none'
                document.getElementById('eventsList').classList.add('active')
                
                renderEvents()
            } catch (error) {
                alert('Authentication failed: ' + error.message)
                btn.disabled = false
                btn.textContent = '🔐 Login & Load Events'
            }
        }
        
        window.seedEvents = async function() {
            const btn = document.getElementById('seedBtn')
            btn.disabled = true
            
            const progressBar = document.getElementById('progressBar')
            const progressFill = document.getElementById('progressFill')
            const statusDiv = document.getElementById('statusMessage')
            
            progressBar.classList.remove('hidden')
            
            let successCount = 0
            let errorCount = 0
            
            for (let i = 0; i < panagbengaEvents.length; i++) {
                const event = panagbengaEvents[i]
                const progress = ((i + 1) / panagbengaEvents.length) * 100
                
                try {
                    await addDoc(collection(db, 'events'), {
                        ...event,
                        createdAt: serverTimestamp()
                    })
                    
                    successCount++
                    progressFill.style.width = progress + '%'
                    progressFill.textContent = `${Math.round(progress)}% - ${event.title}`
                    
                    // Update event item style
                    const eventElement = document.getElementById(`event-${i}`)
                    if (eventElement) {
                        eventElement.style.opacity = '0.5'
                        eventElement.innerHTML += ' ✅ <strong>ADDED</strong>'
                    }
                } catch (error) {
                    errorCount++
                    console.error(`Error adding ${event.title}:`, error)
                }
                
                // Small delay between requests
                await new Promise(resolve => setTimeout(resolve, 500))
            }
            
            btn.disabled = false
            btn.textContent = '✅ Events Added!'
            
            if (successCount > 0) {
                statusDiv.className = 'status success'
                statusDiv.innerHTML = `
                    🎉 Success! Added ${successCount} events to Firebase.<br>
                    ${errorCount > 0 ? `⚠️ ${errorCount} events failed to add.` : ''}<br><br>
                    <strong>Visit the ARAMIDEM page to see all Panagbenga 2026 events!</strong>
                `
            } else {
                statusDiv.className = 'status error'
                statusDiv.innerHTML = '❌ Failed to add events. Check console for details.'
            }
        }
        
        function renderEvents() {
            const container = document.getElementById('eventsContainer')
            
            panagbengaEvents.forEach((event, index) => {
                const eventDiv = document.createElement('div')
                eventDiv.className = `event-item ${event.featured ? 'featured' : ''}`
                eventDiv.id = `event-${index}`
                
                eventDiv.innerHTML = `
                    <div class="event-title">
                        <span>${index + 1}. ${event.title}</span>
                        ${event.featured ? '<span class="badge">⭐ FEATURED</span>' : ''}
                    </div>
                    <div class="event-details">
                        <strong>📅 Date:</strong> ${formatDate(event.startDate)} - ${formatDate(event.endDate)}<br>
                        <strong>🕐 Time:</strong> ${event.startTime} - ${event.endTime}<br>
                        <strong>📍 Location:</strong> ${event.location}<br>
                        <strong>👤 Organizer:</strong> ${event.organizer}<br>
                        <strong>📝 Description:</strong> ${event.description}
                    </div>
                `
                
                container.appendChild(eventDiv)
            })
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr)
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            })
        }
    </script>
</body>
</html>
